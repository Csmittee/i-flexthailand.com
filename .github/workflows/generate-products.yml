name: Generate Product Pages

on:
  push:
    paths:
      - 'data/products.csv'
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Run product generator
        run: python scripts/generate_products.py
      
      - name: Commit and push changes
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git add product-listing.html th/product-listing.html product/ th/product/
          git diff --quiet && git diff --staged --quiet || git commit -m "Auto-generate product pages [skip ci]"
          git push
