<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Case Study | I-Flex Thailand</title>
    <meta name="description" content="Get our studio setup guide. Floor plans, ROI calculator, and vendor comparison checklist for new Pilates studio owners.">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🧘</text></svg>">
    <style>
        body {
            background: white;
        }
        .case-study-page {
            max-width: 1280px;
            margin: 0 auto;
            padding: 4rem 2rem;
        }
        .case-study-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 4rem;
            align-items: start;
        }
        .left-column {
            text-align: left;
        }
        .left-column .tag {
            color: #FFD700;
            font-weight: 600;
            margin-bottom: 1rem;
        }
        .left-column h1 {
            font-size: 2.5rem;
            font-weight: 700;
            margin-bottom: 1rem;
            color: #333;
        }
        .left-column p {
            font-size: 1.1rem;
            line-height: 1.6;
            color: #666;
        }
        .form-container {
            background: #f5f5f5;
            border-radius: 12px;
            padding: 2rem;
        }
        .h2-large {
            font-size: 2rem;
            font-weight: 700;
            margin-bottom: 1rem;
            color: #FFD700;
            text-align: center;
        }
        @media (max-width: 768px) {
            .case-study-grid {
                grid-template-columns: 1fr;
                gap: 2rem;
            }
            .case-study-page {
                padding: 2rem 1rem;
            }
        }
    </style>
</head>
<body>

<div class="case-study-page">
    <div class="case-study-grid">
        <!-- Left Column: Content -->
        <div class="left-column">
            <div class="tag">Premium Pilates Equipment for Southeast Asia's Finest Studios</div>
            <h1>Get our studio setup guide</h1>
            <p>Floor plans · ROI calculator · Vendor comparison checklist — tools trusted by studios across Thailand.</p>
        </div>
        
        <!-- Right Column: Airtable Form -->
        <div class="form-container">
            <iframe 
                class="airtable-embed" 
                src="https://airtable.com/embed/appMBjlfYyVd8I7ML/pagaDtXYiM7eFzHG8/form" 
                frameborder="0" 
                width="100%" 
                height="533" 
                style="background: transparent; border: 1px solid #ccc; border-radius: 8px;">
            </iframe>
        </div>
    </div>
</div>

<script src="/js/iflex-config.js"></script>
<script src="/js/iflex-core.js"></script>
</body>
</html>
