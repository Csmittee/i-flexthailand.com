<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>I-Flex Thailand | Professional Pilates Equipment</title>
    <meta name="description" content="I-Flex imports reliable Pilates equipment proven 5+ years in Bangkok studios. Friendly support for new studio owners. Fast delivery Thailand.">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🧘</text></svg>">
    <style>
        /* Basic body */
        body {
            background: white;
            margin: 0;
            padding: 0;
        }

        /* Hero section - with simple padding to avoid navbar overlap */
        .hero-section {
            min-height: 70vh;
            background-image: url('https://res.cloudinary.com/dfiomi0lb/image/upload/v1774380814/Nok_studio.png');
            background-size: cover;
            background-position: center;
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding-top: 80px;           /* helps with navbar */
        }
        
        @media (max-width: 768px) {
            .hero-section {
                padding-top: 70px;
            }
        }

        .hero-section::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(to bottom, rgba(0,0,0,0.5) 0%, rgba(0,0,0,0.2) 70%, transparent 100%);
            pointer-events: none;
            z-index: 1;
        }
        
        .hero-content {
            position: relative;
            z-index: 2;
            color: white;
            max-width: 800px;
            padding: 2rem;
        }

        /* Header size classes */
        .h1-large {
            font-size: 3rem;
            font-weight: 700;
            line-height: 1.2;
            margin-bottom: 1rem;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
        }
        
        .h2-large {
            font-size: 2.5rem;
            font-weight: 700;
            line-height: 1.2;
            margin-bottom: 1rem;
            color: #FFD700;
            text-shadow: 1px 1px 2px rgba(0,0,0,0.3);
        }
        
        .h2-medium {
            font-size: 2rem;
            font-weight: 600;
            line-height: 1.3;
            margin-bottom: 1rem;
            color: #FFD700;
            text-shadow: 1px 1px 2px rgba(0,0,0,0.3);
        }
        
        .h3-medium {
            font-size: 1.5rem;
            font-weight: 500;
            line-height: 1.4;
            margin-bottom: 0.75rem;
            text-shadow: 1px 1px 2px rgba(0,0,0,0.3);
        }

        /* Section container */
        .section-container {
            max-width: 1280px;
            margin: 0 auto;
            padding: 0 2rem;
        }

        /* Brand section */
        .brand-section {
            text-align: center;
            padding: 3rem 2rem;
            background: linear-gradient(135deg, #f8f8f8 0%, #fff 100%);
            border-bottom: 1px solid #eee;
        }

        /* Marquee section - with fix */
        .marquee-section {
            max-width: 1280px;
            margin: 2rem auto;
            overflow: hidden;
            position: relative;
            background: #fafafa;
            padding: 2rem 0;
            border-radius: 16px;
        }
        
        .marquee-container {
            overflow: hidden;
            width: 100%;
            will-change: transform;
        }
        
        .marquee-track {
            display: flex;
            width: fit-content;
            animation: marquee 25s linear infinite;
            will-change: transform;
            transform: translate3d(0, 0, 0);
        }
        
        .marquee-track img {
            height: 120px;
            width: auto;
            margin: 0 12px;
            border-radius: 12px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            transition: transform 0.3s ease;
            flex-shrink: 0;
            object-fit: cover;
        }
        
        .marquee-track img:hover {
            transform: scale(1.05);
        }
        
        @keyframes marquee {
            0% { transform: translateX(0); }
            100% { transform: translateX(-50%); }
        }
        
        .marquee-container:hover .marquee-track {
            animation-play-state: paused;
        }

        @media (max-width: 768px) {
            .marquee-track img {
                height: 80px;
            }
            .h1-large {
                font-size: 2rem;
            }
        }

        /* Keep all your other original styles below (proven, compare, equipment, cta, category, faq, bottom-hero, btn, etc.) */
        /* Proven section */
        .proven-section {
            text-align: center;
            padding: 4rem 0;
        }

        .compare-table {
            background: #f5f5f5;
            border-radius: 12px;
            overflow-x: auto;
            margin: 2rem auto;
            max-width: 960px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }

        /* ... paste the rest of your original styles here (compare-row, equipment, banner, category-card, cta, bottom-hero, faq, btn, etc.) ... */

    </style>
</head>
<body>

    <!-- HERO SECTION -->
    <section class="hero-section">
        <div class="hero-content">
            <h1 class="h1-large">5 years tested<br>used daily at Nok Yoga Pattaya</h1>
            <a href="/contact-us.html" class="btn">Get your Quote today</a>
        </div>
    </section>

    <!-- BRAND SECTION -->
    <div class="brand-section">
        <div class="section-container">
            <h2 class="h2-medium">I-flex Thailand<br>Power by Adjusted body<br>China</h2>
            <p>Adjust body found since 2013, over 100k reformers already produced and shipped to 180 countries worldwide</p>
        </div>
    </div>

    <!-- MARQUEE SECTION -->
    <div class="marquee-section">
        <div class="marquee-container">
            <div class="marquee-track">
                <!-- your marquee images here - keep all of them -->
                <img src="https://res.cloudinary.com/dfiomi0lb/image/upload/v1774576735/Show_room_16.png" alt="Showroom image">
                <!-- ... all other images and the duplicate set for seamless loop ... -->
            </div>
        </div>
    </div>

    <!-- The rest of your content (proven, compare, equipment, cta, products, faq, bottom-hero) -->
    <!-- Copy and paste the remaining sections from your original document -->

    <!-- INJECTOR SCRIPTS -->
    <script src="/js/iflex-config.js"></script>
    <script src="/js/iflex-core.js"></script>
    
    <!-- FAQ Accordion Script -->
    <script>
        document.querySelectorAll('.faq-question').forEach(button => {
            button.addEventListener('click', () => {
                const answer = button.nextElementSibling;
                const isActive = answer.classList.contains('active');
                
                document.querySelectorAll('.faq-answer').forEach(ans => ans.classList.remove('active'));
                document.querySelectorAll('.faq-question').forEach(btn => btn.classList.remove('active'));
                
                if (!isActive) {
                    answer.classList.add('active');
                    button.classList.add('active');
                }
            });
        });
    </script>
</body>
</html>
